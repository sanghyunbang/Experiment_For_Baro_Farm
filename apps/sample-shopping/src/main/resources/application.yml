server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: sample-shopping
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/baro_experiment?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:barouser}
    password: ${SPRING_DATASOURCE_PASSWORD:baropassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

experiment:
  auth-mode: ${AUTH_MODE:DB_ONLY}
