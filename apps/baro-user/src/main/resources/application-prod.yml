server:
  port: ${SERVER_PORT:${BARO_USER_PORT:8087}}

api:
  v1: /api/v1

spring:
  application:
    name: user-service
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:${BARO_USER_DATASOURCE_URL:jdbc:mysql://my-mysql.db.svc.cluster.local:3306/baro_user?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${BARO_USER_DB_USERNAME:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${BARO_USER_DB_PASSWORD:}}
  data:
    redis:
      host: ${REDIS_HOST:${BARO_USER_REDIS_HOST:my-redis-master.cache.svc.cluster.local}}
      port: ${REDIS_PORT:${BARO_USER_REDIS_PORT:6379}}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:${BARO_USER_REDIS_PASSWORD:}}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${BARO_USER_KAFKA_BOOTSTRAP_SERVERS:my-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092}}
    consumer:
      group-id: user-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true
  mail:
    host: smtp.naver.com
    port: 465
    username: ${BARO_USER_MAIL_USERNAME:}
    password: ${BARO_USER_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.naver.com

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      enabled: true

jwt:
  secret: "${BARO_USER_JWT_SECRET:replace-with-secure-secret-key-min-32-bytes}"
  access-token-validity-ms: 604800000
  refresh-token-validity-ms: 1209600000

auth:
  cookie:
    access-name: access_token
    refresh-name: refresh_token
    secure: ${BARO_USER_AUTH_COOKIE_SECURE:true}
    same-site: Strict
    path: /
    domain: ${BARO_USER_AUTH_COOKIE_DOMAIN:}
  kafka:
    topic:
      user-events: ${BARO_USER_AUTH_USER_EVENTS_TOPIC:user-events}
  outbox:
    publish-interval-ms: ${BARO_USER_AUTH_OUTBOX_PUBLISH_INTERVAL_MS:1000}
    max-attempts: ${BARO_USER_AUTH_OUTBOX_MAX_ATTEMPTS:5}

oauth:
  kakao:
    client-id: ${BARO_USER_KAKAO_CLIENT_ID:}
    client-secret: ${BARO_USER_KAKAO_CLIENT_SECRET:}
    redirect-uri: ${BARO_USER_KAKAO_REDIRECT_URI:${BARO_PUBLIC_BASE_URL:https://api.baro.com}/user-service/api/v1/auth/oauth/callback?provider=kakao}
    token-uri: ${BARO_USER_KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${BARO_USER_KAKAO_USERINFO_URI:https://kapi.kakao.com/v2/user/me}

opa:
  hotlist-enabled: ${HOTLIST_ENABLED:true}
  kafka:
    topic: ${BARO_USER_OPA_HOTLIST_TOPIC:opa-hotlist-events}
