server:
  port: ${BARO_USER_PORT:8087}

api:
  v1: /api/v1

spring:
  application:
    name: user-service
  config:
    import: ${BARO_USER_CONFIG_IMPORT:optional:configserver:http://localhost:8888}
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${BARO_USER_DATASOURCE_URL:jdbc:mysql://localhost:3307/baro_user?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 로컬 Docker MySQL 기본 계정에 맞춘다.
    # 별도 환경 변수를 주지 않으면 docker-compose.data.yml의 barouser/baropassword를 사용한다.
    username: ${BARO_USER_DB_USERNAME:barouser}
    password: ${BARO_USER_DB_PASSWORD:baropassword}
  kafka:
    # 로컬 IDE에서 실행하는 애플리케이션은 Docker Kafka의 외부 리스너(localhost:9092)에 붙어야 한다.
    # 29092는 컨테이너 내부 통신용 리스너라서 호스트에서 직접 접근하면 연결이 실패할 수 있다.
    bootstrap-servers: ${BARO_USER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true
  mail:
    host: smtp.naver.com
    port: 465
    username: ${BARO_USER_MAIL_USERNAME:}
    password: ${BARO_USER_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.naver.com

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      enabled: true

jwt:
  secret: "${BARO_USER_JWT_SECRET:replace-with-secure-secret-key-min-32-bytes}"
  access-token-validity-ms: 604800000
  refresh-token-validity-ms: 1209600000

auth:
  bootstrap:
    admin:
      # 로컬에서만 자동으로 admin 계정을 만든다.
      # enabled=true 이고 profile=local 일 때만 LocalAdminBootstrap 이 동작한다.
      # 현재 비밀번호 해시는 password + salt(64 hex chars)를 BCrypt에 넣는 구조라
      # BCrypt 72-byte 제한 때문에 여기 비밀번호는 ASCII 기준 8자 이하여야 한다.
      enabled: true
      email: local-admin@baro.test
      password: admin123
      name: Local Admin
      phone: 010-0000-0000
  cookie:
    access-name: access_token
    refresh-name: refresh_token
    # 로컬은 http://localhost 기반으로 프런트와 백엔드가 뜨므로 Secure=true 이면
    # 브라우저가 인증 쿠키를 저장/전송하지 않을 수 있다.
    # 운영은 HTTPS를 전제로 Secure=true를 유지하고, 로컬만 기본값을 false로 둔다.
    secure: ${BARO_USER_AUTH_COOKIE_SECURE:false}
    same-site: Strict
    path: /
    domain: ${BARO_USER_AUTH_COOKIE_DOMAIN:}
  kafka:
    topic:
      user-events: ${BARO_USER_AUTH_USER_EVENTS_TOPIC:user-events}
  outbox:
    # 로컬 개발에서는 JPA SQL 확인이 우선이라 주기적 outbox polling publisher를 기본적으로 끈다.
    # true 로 바꾸면 Outbox -> Kafka 발행 흐름까지 함께 검증할 수 있지만,
    # 그 경우 outbox_event 조회 SQL이 주기적으로 계속 출력될 수 있다.
    publisher:
      enabled: false
    publish-interval-ms: ${BARO_USER_AUTH_OUTBOX_PUBLISH_INTERVAL_MS:1000}
    max-attempts: ${BARO_USER_AUTH_OUTBOX_MAX_ATTEMPTS:5}

oauth:
  kakao:
    client-id: ${BARO_USER_KAKAO_CLIENT_ID:}
    client-secret: ${BARO_USER_KAKAO_CLIENT_SECRET:}
    redirect-uri: ${BARO_USER_KAKAO_REDIRECT_URI:http://localhost:3000/oauth/kakao/callback}
    token-uri: ${BARO_USER_KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${BARO_USER_KAKAO_USERINFO_URI:https://kapi.kakao.com/v2/user/me}

opa:
  hotlist-enabled: ${HOTLIST_ENABLED:true}
  kafka:
    topic: ${BARO_USER_OPA_HOTLIST_TOPIC:opa-hotlist-events}

logging:
  level:
    # Hibernate가 실제로 실행한 SQL 문장을 출력한다.
    org.hibernate.SQL: DEBUG
    # SQL의 ? 바인딩 값까지 함께 출력한다. 디버깅에는 유용하지만 로그가 많아질 수 있다.
    org.hibernate.orm.jdbc.bind: TRACE
    # Kafka 프레임워크 로그는 너무 많아서 로컬에서는 ERROR까지만 본다.
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
    # Outbox/Kafka 애플리케이션 로그는 WARN으로 낮춰 JPA SQL 확인을 방해하지 않게 한다.
    # 단, SQL 자체는 Hibernate 로그이므로 publisher가 살아 있으면 outbox polling SELECT는 계속 보일 수 있다.
    com.barofarm.auth.infrastructure.outbox: WARN
    com.barofarm.auth.infrastructure.kafka: WARN
    com.barofarm.auth.seller.infrastructure.kafka: WARN
